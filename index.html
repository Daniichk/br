<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentOS — Dev & Math Edition</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --dark-glass: rgba(0, 0, 0, 0.7);
        }
        * { box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, sans-serif; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: url('https://images.unsplash.com') center/cover;
            overflow: hidden;
        }

        /* Desktop */
        .desktop {
            height: calc(100vh - 70px);
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, 100px);
            grid-template-rows: repeat(auto-fill, 100px);
            gap: 20px;
        }

        .icon {
            display: flex; flex-direction: column; align-items: center;
            cursor: pointer; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-size: 13px; transition: 0.2s;
        }
        .icon:hover { transform: scale(1.1); }
        .icon img { width: 60px; height: 60px; border-radius: 12px; margin-bottom: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Window System */
        .window {
            position: absolute; top: 100px; left: 100px;
            width: 700px; height: 450px;
            background: white; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: none; flex-direction: column; overflow: hidden;
            z-index: 10;
        }

        .title-bar {
            background: #ebebeb; padding: 10px;
            display: flex; align-items: center; justify-content: space-between;
        }

        .dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .red { background: #ff5f56; } .yellow { background: #ffbd2e; } .green { background: #27c93f; }

        /* App Contents */
        .content { flex: 1; padding: 0; display: flex; flex-direction: column; }
        textarea {
            width: 100%; height: 100%; border: none; padding: 20px;
            font-family: 'Fira Code', monospace; font-size: 14px; outline: none; resize: none;
        }
        canvas { background: #fff; cursor: crosshair; width: 100%; height: 100%; }

        /* Dock */
        .dock-container {
            position: fixed; bottom: 10px; width: 100%;
            display: flex; justify-content: center;
        }
        .dock {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 10px 20px; border-radius: 20px;
            display: flex; gap: 15px; border: 1px solid rgba(255,255,255,0.3);
        }
        .dock img { width: 50px; height: 50px; transition: 0.3s; cursor: pointer; }
        .dock img:hover { transform: scale(1.3) translateY(-10px); }

        .btn-save {
            padding: 5px 15px; background: #007aff; color: white;
            border: none; border-radius: 5px; cursor: pointer; font-size: 12px;
        }
    </style>
</head>
<body>

<div class="desktop">
    <div class="icon" onclick="openApp('editor')">
        <img src="https://cdn-icons-png.flaticon.com" alt="Code">
        <span>IDE Write</span>
    </div>
    <div class="icon" onclick="openApp('math')">
        <img src="https://cdn-icons-png.flaticon.com" alt="Math">
        <span>MathLab</span>
    </div>
</div>

<!-- Editor Window -->
<div id="editor" class="window">
    <div class="title-bar">
        <div class="dots"><div class="dot red" onclick="closeApp('editor')"></div><div class="dot yellow"></div><div class="dot green"></div></div>
        <span style="font-weight: 600; font-size: 13px;">Code Editor</span>
        <button class="btn-save" onclick="downloadFile()">Download .txt</button>
    </div>
    <div class="content">
        <textarea id="codeArea" placeholder="// Начни писать код или текст здесь..."></textarea>
    </div>
</div>

<!-- Math Window -->
<div id="math" class="window" style="width: 400px; height: 300px;">
    <div class="title-bar">
        <div class="dots"><div class="dot red" onclick="closeApp('math')"></div><div class="dot yellow"></div><div class="dot green"></div></div>
        <span style="font-weight: 600; font-size: 13px;">Math Solver</span>
        <span></span>
    </div>
    <div class="content" style="padding: 20px; background: #f9f9f9;">
        <input type="text" id="mathInput" placeholder="2 + 2 * 5" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
        <h2 id="mathResult" style="text-align: center; margin-top: 20px; color: #007aff;">0</h2>
        <button onclick="solveMath()" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">Вычислить</button>
    </div>
</div>

<div class="dock-container">
    <div class="dock">
        <img src="https://cdn-icons-png.flaticon.com" onclick="openApp('editor')">
        <img src="https://cdn-icons-png.flaticon.com" onclick="openApp('math')">
        <img src="https://cdn-icons-png.flaticon.com" onclick="alert('Google Drive Sync Active')">
    </div>
</div>

<script>
    function openApp(id) {
        document.getElementById(id).style.display = 'flex';
    }

    function closeApp(id) {
        document.getElementById(id).style.display = 'none';
    }

    // Функция скачивания файла
    function downloadFile() {
        const text = document.getElementById('codeArea').value;
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = 'my-project.txt';
        anchor.href = (window.webkitURL || window.URL).createObjectURL(blob);
        anchor.dataset.downloadurl = ['text/plain', anchor.download, anchor.href].join(':');
        anchor.click();
    }

    // Функция для математики
    function solveMath() {
        try {
            const input = document.getElementById('mathInput').value;
            const res = eval(input); // Простой пример, для реальных задач лучше math.js
            document.getElementById('mathResult').innerText = res;
        } catch(e) {
            alert("Ошибка в выражении");
        }
    }

    // Сделать окна перемещаемыми (простой drag and drop)
    const windows = document.querySelectorAll('.window');
    windows.forEach(win => {
        let isDragging = false;
        win.querySelector('.title-bar').onmousedown = (e) => {
            isDragging = true;
            let offsetX = e.clientX - win.offsetLeft;
            let offsetY = e.clientY - win.offsetTop;
            document.onmousemove = (e) => {
                if(isDragging) {
                    win.style.left = (e.clientX - offsetX) + 'px';
                    win.style.top = (e.clientY - offsetY) + 'px';
                }
            }
            document.onmouseup = () => isDragging = false;
        };
    });
</script>

</body>
</html>
