    const panicUrl = "https://classroom.google.com";
    const idleLimit = 5 * 60 * 1000; 
    let idleTimer;

    function resetTimer() {
        clearTimeout(idleTimer);
        idleTimer = setTimeout(() => {
            if (document.getElementById('portal-overlay').style.display === 'block') window.location.href = panicUrl;
        }, idleLimit);
    }

    function unlockPortal() {
        const overlay = document.getElementById('portal-overlay');
        const frame = document.getElementById('portal-frame');

        try {
            // STEP 1: Decode Base64 to a raw binary string
            const binaryString = atob(secretData);
            
            // STEP 2: Convert to a Byte Array (This preserves the Llama and Emoji symbols)
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) {
                bytes[i] = binaryString.charCodeAt(i);
            }

            // STEP 3: Create a Blob using UTF-8 encoding
            const blob = new Blob([bytes], { type: 'text/html;charset=utf-8' });
            
            // STEP 4: Set the source and show the game
            frame.src = URL.createObjectURL(blob);
            overlay.style.display = 'block';
            frame.focus();

            // Setup tracking
            const events = ['mousedown', 'mousemove', 'keypress', 'touchstart'];
            events.forEach(e => document.addEventListener(e, resetTimer, true));
            frame.onload = () => {
                const fDoc = frame.contentWindow.document;
                events.forEach(e => fDoc.addEventListener(e, resetTimer, true));
            };
            resetTimer();
        } catch (e) {
            console.error("Payload execution failed. Check your Base64 string.");
        }
    }

    document.addEventListener('keydown', (e) => {
        // ACTIVATE: Ctrl + Shift + 6
        if (e.ctrlKey && e.shiftKey && e.keyCode === 54) {
            e.preventDefault();
            unlockPortal();
        }
        // PANIC: Escape
        if (e.key === "Escape" && document.getElementById('portal-overlay').style.display === 'block') {
            window.location.href = panicUrl;
        }
    });
</script>
